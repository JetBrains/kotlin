import java.time.LocalDateTime
import java.time.ZoneId
import java.util.concurrent.TimeUnit

plugins {
    id "org.jetbrains.kotlin.multiplatform"
}

File nodeJsDownloadDir = layout.projectDirectory.dir("custom-node-js-dir").asFile

tasks.register("checkDownloadedFolder") {
    description = "updated last modified date for downloaded folder"
    dependsOn "build"
    doLast {
        println("check downloaded folder existence")
        if (!nodeJsDownloadDir.exists() || !nodeJsDownloadDir.isDirectory()) {
            throw new InvalidUserDataException("Downloaded folder was not found")
        }
        println("try to update lastModifiedDate")
        println(nodeJsDownloadDir.lastModified())
        def successUpdated = nodeJsDownloadDir.setLastModified(LocalDateTime.now().minusDays(35).atZone(ZoneId.systemDefault()).toInstant().toEpochMilli())
        println(nodeJsDownloadDir.lastModified())
        if (!successUpdated) {
            throw new InvalidUserDataException("Unable to update last modified date")
        }
    }
}

tasks.register("checkIfLastModifiedNotNow") {
    description = "check if last modified is not current date now"
    dependsOn "build"
    doLast {
        println("check downloaded folder existence")
        if (!nodeJsDownloadDir.exists() || !nodeJsDownloadDir.isDirectory()) {
            throw new InvalidUserDataException("Downloaded folder was not found")
        }

        def now = LocalDateTime.now().atZone(ZoneId.systemDefault()).toInstant().toEpochMilli()

        def lastModified = nodeJsDownloadDir.lastModified()
        def lastModified1 = lastModified + TimeUnit.DAYS.toMillis(1)
        def lastModified2 = lastModified - TimeUnit.DAYS.toMillis(1)

        if (now < lastModified1 || now < lastModified2) {
            throw new InvalidUserDataException("Last modified date was updated")
        }
    }
}

tasks.register("testCleanTask") {
    description = "check clean task behaviour"
    doLast {
        println("check deletion of downloaded folder")
        if (nodeJsDownloadDir.exists()) {
            throw new InvalidUserDataException("Folder was not deleted")
        }
    }
}

project.plugins.withType(org.jetbrains.kotlin.gradle.targets.js.nodejs.NodeJsPlugin) {
    def spec = project.extensions.getByType(org.jetbrains.kotlin.gradle.targets.js.nodejs.NodeJsEnvSpec)
    // use custom download dir, so deleting NodeJS doesn't interfere with other tests.
    spec.installationDirectory.set(nodeJsDownloadDir)
    println("Set spec.installationDirectory to $nodeJsDownloadDir")
}

afterEvaluate {
    project.tasks.nodeKotlinClean.dependsOn(checkDownloadedFolder)
    project.tasks.testCleanTask.dependsOn(nodeKotlinClean)
}

kotlin {
    js {
        browser {}
    }
}
