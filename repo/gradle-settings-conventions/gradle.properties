kotlin.build.gradlePlugin.version=0.0.42
kotlin.options.suppressFreeCompilerArgsModificationWarning=true
cacheRedirectorEnabled=true
systemProp.org.gradle.internal.plugins.portal.url.override=https://cache-redirector.jetbrains.com/plugins.gradle.org/m2
# Should be in sync with ":kotlin-daemon-config" project convention script configuration
kotlin.daemon.jvmargs=-Xmx3g

org.gradle.kotlin.dsl.allWarningsAsErrors=true
kotlin.compiler.runViaBuildToolsApi=true
kotlin.compiler.execution.strategy=in-process
