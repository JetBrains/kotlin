junit.jupiter.execution.timeout.default = 10 m
# When a timeout is applied, JUnit wraps each test in a separate thread to enforce the time limit — and this thread management can interfere with parallelism configuration.
# The default value of `junit.jupiter.execution.timeout.thread.mode` is `same_thread`,
# which means JUnit enforces the timeout by running the test body in the same thread but blocking the executor thread while waiting
# and this effectively serializes test execution even if parallel mode is enabled.
# In `separate_thread` mode, the test runs in a new thread and the executor thread is freed immediately, allowing other tests to run in parallel as expected.
junit.jupiter.execution.timeout.thread.mode.default = separate_thread
