$schema: domains.schema.json

Compiler:
  home: "compiler"
  include:
    - "compiler/**"
    - "core/**"
  fullyAffectedBy:
    - Unknown
    - CoreLibs

Wasm:
  home: "wasm"
  include:
    - "wasm/**"
  fullyAffectedBy:
    - Compiler
    - CoreLibs
Js:
  home: "js"
  include:
    - "js/**"
  fullyAffectedBy:
    - Compiler
    - CoreLibs

Native:
  home: "kotlin-native"
  include:
    - "native/**"
    - "kotlin-native/**"
  fullyAffectedBy:
    - Compiler
    - CoreLibs

CoreLibs:
  home: "stdlib"
  include:
    - "libraries/stdlib/**"
    - "libraries/reflect/**"
    - "libraries/kotlin.test/**"

AnalysisApi:
  home: "analysis"
  include:
    - "analysis/**"
    - "compiler/psi/**"
  exclude:
    - "compiler/psi/parser/**"
  fullyAffectedBy:
    - Compiler

SwiftExport:
  home: "native/swift"
  include:
    - "native/swift/**"

CompilerPlugins:
  home: "plugins"
  include:
    - "plugins/**"
  fullyAffectedBy:
    - Compiler
    - Unknown

Gradle:
  home: "libraries/tools/kotlin-gradle-plugin"
  include:
    - "libraries/tools/*gradle*/**"

Maven:
  home: "libraries/tools/kotlin-maven-plugin"
  include:
    - "libraries/tools/*maven*/**"

# The IntelliJ domain has no owned files in this repository.
# It is used to declare which domains will affect IntelliJ and to infer when to run tests against kt-master
IntelliJ:
  home: "idea"
  include: []
  fullyAffectedBy:
    - Compiler
    - AnalysisApi
    - CoreLibs

BuildInfrastructure:
  home: "repo"
  include:
    - "repo/**"
    - "gradle/**"
    - "build.gradle.kts"
    - "settings.gradle.kts"
    - "gradle.properties"
    - "scripts/**"

Unknown:
  home: "."
  include:
    - "**/*"
  fullyAffectedBy:
    - Compiler
