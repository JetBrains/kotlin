# Consider setting JUnit Platform properties via systemProperty in nativeTestTask() in repo/gradle-build-conventions/project-tests-convention/src/main/kotlin/nativeTest.kt
# Reasons are:
#   1. Consistency across all callers — the decisive argument: nativeTestTask() is used by 18 modules, not just native.tests.
#   JUnit reads junit-platform.properties from the classpath root, and the current properties file lives only under native/native.tests/testResources.
#   So properties in this file would be applied only to test tasks that actually had that module's resources on their runtime classpath — the many other
#   nativeTestTask() callers silently ran with different parallel/timeout settings.
#   Making the settings in nativeTestTask() guarantees every caller gets an identical configuration:
#     1. native/native.tests/*: driver, cli-tests, codegen-box, stress, klib-ir-inliner, klib-compatibility, litmus-tests, gc-fuzzing-tests, …
#     2. native/swift/*: swift-export-ide, swift-export-embeddable, sir-light-classes, the swift-export-standalone-integration-tests, …
#   2. Single source of truth / maintainability.
#      All native test JVM/JUnit configurations now live in one place in nativeTest.kt, next to the already-present useJUnitPlatform { … } and the parallelism-related logic.
#      Adding or tweaking a future JUnit setting is one edit in one file instead of "edit Gradle code and remember a stray resource file that only some modules see".
#   3. It can react to task parameters.
#      The properties file is static, but the timeout/parallel settings legitimately depend on allowParallelExecution.
#      A flat properties file cannot express this; the code using branching and systemProperty() can.
#   4. Discoverability and logging.
#      The existing doFirst { … systemProperties.filterKeys { it.startsWith("junit.jupiter") } … } block logs the effective JUnit settings.
#      With systemProperty, the values set here show up in that diagnostic; values coming only from a classpath resource are easy to miss.
